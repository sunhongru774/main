<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华夏美食地图 - 餐厅点餐系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/vendor/echarts/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; overflow-x: hidden; background: #0a0a1a; color: #fff; }
        .header { background: rgba(10,10,26,0.9); backdrop-filter: blur(10px); padding: 0 30px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .header .logo { font-size: 22px; font-weight: bold; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .header .logo span { background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #e74c3c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header nav { display: flex; align-items: center; gap: 24px; }
        .header nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: all 0.3s; position: relative; }
        .header nav a:hover { color: #f6d365; }
        .header nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #f6d365, #fda085); transition: width 0.3s; }
        .header nav a:hover::after { width: 100%; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info span { color: rgba(255,255,255,0.8); font-size: 14px; }
        .user-info a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
        .user-info a:hover { color: #f6d365; }
        #map-container { width: 100%; height: 100vh; position: relative; }
        .back-btn { position: fixed; top: 80px; left: 24px; z-index: 100; display: none; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(10px); cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.15); }
        .back-btn.active { display: block; }
        .film-strip { display: none; position: fixed; bottom: 0; left: 0; right: 0; min-height: 320px; z-index: 50; background: linear-gradient(transparent, rgba(10,10,26,0.97) 24%); pointer-events: none; padding-top: 72px; }
        .film-heading { display: flex; align-items: end; gap: 14px; padding: 0 40px 4px; pointer-events: auto; }
        .film-heading .province { font-size: 34px; font-weight: 800; color: #fff; }
        .film-heading .hint { color: #7ee7c7; font-size: 13px; letter-spacing: 0; }
        .film-heading .desc { color: rgba(255,255,255,0.58); font-size: 15px; }
        .film-strip-inner { display: flex; overflow-x: auto; gap: 14px; padding: 16px 40px 24px; pointer-events: auto; scroll-behavior: smooth; align-items: stretch; }
        .film-strip-inner::-webkit-scrollbar { height: 3px; }
        .film-strip-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .film-card { width: 260px; min-width: 260px; min-height: 172px; background: rgba(25,24,25,0.88); border: 1px solid rgba(246,211,101,0.18); border-radius: 8px; cursor: pointer; transition: all 0.3s; flex-shrink: 0; overflow: hidden; backdrop-filter: blur(10px); display: flex; flex-direction: column; color: #fff; }
        .film-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.1); border-color: rgba(246,211,101,0.3); box-shadow: 0 12px 40px rgba(246,211,101,0.1); }
        .film-card .cover { height: 86px; background-size: cover; background-position: center; position: relative; }
        .film-card .cover::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.62)); }
        .film-card .meta { padding: 11px 13px 13px; flex: 1; display: flex; flex-direction: column; gap: 7px; }
        .film-card .origin { color: #7ee7c7; font-size: 12px; }
        .film-card h4 { font-size: 20px; color: #fff; line-height: 1.15; }
        .film-card .summary { color: rgba(255,255,255,0.66); font-size: 12px; line-height: 1.45; min-height: 34px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .film-card .card-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: auto; }
        .film-card .tags { color: rgba(255,255,255,0.44); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .film-card .price { color: #f6d365; font-weight: bold; font-size: 18px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; animation: modalIn 0.3s ease; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 20px; color: #fff; }
        .modal-close { width: 32px; height: 32px; border: none; background: rgba(255,255,255,0.06); border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.6); transition: all 0.3s; }
        .modal-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .modal-body { padding: 24px; color: rgba(255,255,255,0.8); }
        .modal-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.06); text-align: right; }
        .modal-footer .btn { background: linear-gradient(135deg, #f6d365, #fda085); border: none; color: #1a1a2e; padding: 10px 28px; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .modal-footer .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(246,211,101,0.2); }
        @keyframes modalIn { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-right: 6px; margin-bottom: 4px; }
        .tag-spicy { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.2); }
        .tag-light { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.2); }
        .tag-savory { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.2); }
        @media (max-width: 768px) {
            .header { padding: 0 16px; }
            .header nav { gap: 12px; }
            .header nav a { font-size: 12px; }
            .film-strip { min-height: 310px; }
            .film-heading { padding-left: 20px; padding-right: 20px; flex-wrap: wrap; }
            .film-heading .province { font-size: 26px; }
            .film-card { width: 220px; min-width: 220px; }
            .film-strip-inner { padding: 16px 20px; }
        }
        /* Toast */
    .custom-toast { position:fixed;top:80px;right:24px;padding:14px 24px;border-radius:12px;font-size:14px;z-index:9999;animation:fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);min-width:220px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,0.45);backdrop-filter:blur(12px);font-weight:600;transition:all 0.3s ease; }
    @keyframes fadeSlideIn {
        from { transform: translateX(100px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    .toast-info { background: linear-gradient(135deg, #f6d365, #fda085); color: #1a1a2e; }
    .toast-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #ffffff; }
    .toast-error { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #ffffff; }

    </style>
</head>
<body>
<div class="header">
    <a href="/" class="logo">🍜 <span>华夏美食</span>地图</a>
    <nav>
        <a href="/pages/ai-recommend.html">🤖 AI推荐</a>
        <a href="/pages/cart.html">🛒 购物车</a>
        <a href="/pages/orders.html">📋 订单</a><a href="/pages/admin.html" id="adminLink" style="display:none;">⚙️ 管理后台</a>
        <span class="user-info" id="userInfo"><a href="/pages/login.html">登录</a></span>
    </nav>
</div>

<div id="map-container"></div>
<button class="back-btn" id="backBtn" onclick="resetMap()">← 返回全国</button>

<div class="film-strip" id="filmStrip">
    <div class="film-heading">
        <div class="province" id="filmProvince">省份美食</div>
        <div>
            <div class="hint">餐厅现有菜品</div>
            <div class="desc" id="filmDesc">悬停省份查看美食卡片</div>
        </div>
    </div>
    <div class="film-strip-inner" id="filmInner"></div>
</div>

<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header"><h3 id="modalTitle">菜品详情</h3><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button class="btn" id="addToCartBtn" onclick="addToCart()">加入购物车</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    var ph='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22200%22%20height%3D%22150%22%20viewBox%3D%220%200%20200%20150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%231a1a2e%22%20rx%3D%228%22/%3E%3Ctext%20x%3D%22100%22%20y%3D%2280%22%20text-anchor%3D%22middle%22%20fill%3D%22rgba%28255%2C255%2C255%2C0.3%29%22%20font-size%3D%2214%22%20font-family%3D%22sans-serif%22%3E%E6%9A%82%E6%97%A0%E5%9B%BE%E7%89%87%3C/text%3E%3C/svg%3E'; var chart, currentProvince = null, currentDishId = null, provinces = [], dishData = {}, autoScrollTimer = null;

    fetch('/data/china.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            echarts.registerMap('china', data);
            initMap();
            loadProvinces();
        });

    function initMap() {
        chart = echarts.init(document.getElementById('map-container'));
        chart.setOption({
            backgroundColor: '#0a0a1a',
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(26,26,46,0.95)',
                borderColor: 'rgba(255,255,255,0.1)',
                textStyle: { color: '#fff', fontSize: 13 },
                formatter: function(params) {
                    if (params.data && params.data.provinceInfo) {
                        var info = params.data.provinceInfo;
                        var provinceName = normalizeProvinceName(params.name);
                        var dishes = dishData[provinceName] || [];
                        var h = '<div style="text-align:center;padding:4px 0;"><strong style="font-size:16px;color:#f6d365;">' + info.cuisineName + '</strong><br><span style="color:rgba(255,255,255,0.6);font-size:12px;">' + info.description + '</span>';
                        if (dishes.length > 0) {
                            h += '<div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.08);">';
                            for (var i = 0; i < dishes.length && i < 3; i++) {
                                var d = dishes[i];
                                var img = d.imageUrl || ph;
                                h += '<div style="display:inline-block;width:70px;margin:4px;text-align:center;vertical-align:top;">';
                                h += '<img src="' + img + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px;display:block;margin:0 auto 4px;" onerror="this.remove()">';
                                h += '<span style="font-size:11px;color:rgba(255,255,255,0.7);display:block;">' + d.name + '</span>';
                                h += '<span style="font-size:11px;color:#f6d365;">\u00a5' + d.price + '</span></div>';
                            }
                            h += '</div>';
                        }
                        h += '</div>';
                        return h;
                    }
                    return params.name;
                }
            },
            visualMap: { show: false },
            geo: {
                map: 'china',
                roam: true,
                zoom: 1.1,
                center: [104, 35],
                regions: generateRegions(),
                itemStyle: {
                    areaColor: '#1a1a3e',
                    borderColor: 'rgba(246,211,101,0.2)',
                    borderWidth: 0.5,
                    shadowBlur: 20,
                    shadowColor: 'rgba(246,211,101,0.05)'
                },
                emphasis: {
                    itemStyle: {
                        areaColor: {
                            type: 'radial',
                            x: 0.5, y: 0.5, r: 0.8,
                            colorStops: [
                                { offset: 0, color: '#f6d365' },
                                { offset: 0.5, color: '#fda085' },
                                { offset: 1, color: '#e74c3c' }
                            ]
                        },
                        shadowBlur: 30,
                        shadowColor: 'rgba(246,211,101,0.3)'
                    },
                    label: { show: true, color: '#fff', fontSize: 14, fontWeight: 'bold', textShadowBlur: 4, textShadowColor: 'rgba(0,0,0,0.5)' }
                },
                label: { show: false, color: 'rgba(255,255,255,0.5)', fontSize: 10 }
            },
            series: [{
                type: 'map',
                map: 'china',
                geoIndex: 0,
                data: [],
                zlevel: 1
            }]
        });

        chart.on('click', function(params) {
            var provinceName = normalizeProvinceName(params.name);
            if (provinceName && provinces.includes(provinceName)) focusProvince(provinceName);
            else if (!params.name) resetMap();
        });
        chart.on('mouseover', function(params) {
            var provinceName = normalizeProvinceName(params.name);
            if (provinceName && provinces.includes(provinceName)) showProvinceDishes(provinceName);
        });
        window.addEventListener('resize', function() { chart.resize(); });
    }

    function normalizeProvinceName(name) {
        return (name || '')
            .replace(/特别行政区$/, '')
            .replace(/壮族自治区$/, '')
            .replace(/回族自治区$/, '')
            .replace(/维吾尔自治区$/, '')
            .replace(/自治区$/, '')
            .replace(/[省市]$/, '');
    }

    function toMapProvinceName(name) {
        var map = {
            '北京': '北京市',
            '天津': '天津市',
            '上海': '上海市',
            '重庆': '重庆市',
            '内蒙古': '内蒙古自治区',
            '广西': '广西壮族自治区',
            '宁夏': '宁夏回族自治区',
            '新疆': '新疆维吾尔自治区',
            '西藏': '西藏自治区',
            '香港': '香港特别行政区',
            '澳门': '澳门特别行政区'
        };
        return map[name] || (name ? name + '省' : name);
    }

    function generateRegions() {
        var active = ['四川','广东','山东','江苏','浙江','福建','湖南','安徽','北京','陕西'].map(toMapProvinceName);
        return active.map(function(p) {
            return {
                name: p,
                itemStyle: {
                    areaColor: {
                        type: 'radial',
                        x: 0.5, y: 0.5, r: 0.8,
                        colorStops: [
                            { offset: 0, color: '#2a2a5e' },
                            { offset: 0.5, color: '#3a1a3e' },
                            { offset: 1, color: '#2a1520' }
                        ]
                    },
                    borderColor: 'rgba(246,211,101,0.3)',
                    borderWidth: 1
                },
                label: { show: false }
            };
        });
    }

    function loadProvinces() {
        apiGet('/api/province/list').then(function(res) {
            if (res.code === 200 && res.data) {
                provinces = res.data.map(function(p) { return p.provinceName; });
                chart.setOption({
                    series: [{ data: res.data.map(function(p) { return { name: toMapProvinceName(p.provinceName), provinceInfo: p }; }) }]
                });

                // 【核心修复】：单次请求获取全量菜品，并在前端按省份分组
                apiGet('/api/dish/list').then(function(dishRes) {
                    if (dishRes.code === 200 && dishRes.data) {
                        dishData = {};
                        dishRes.data.forEach(function(d) {
                            var p = normalizeProvinceName(d.province);
                            if (!dishData[p]) dishData[p] = [];
                            dishData[p].push(d);
                        });
                        if (currentProvince) updateFilmStrip();
                    }
                });
            }
        });
    }

    function focusProvince(name) {
        showProvinceDishes(name);
        var c = { '四川': [102.5,30.5],'广东': [113.5,23.5],'山东': [118,36],'江苏': [119.5,33],'浙江': [120.2,29.5],'福建': [118.5,26],'湖南': [112,27.5],'安徽': [117,31.5],'北京': [116.4,40],'陕西': [109,35.5] };
        var z = { '四川': 1.8,'广东': 2.2,'山东': 2.2,'江苏': 2.5,'浙江': 2.5,'福建': 2.2,'湖南': 2.2,'安徽': 2.5,'北京': 3.0,'陕西': 2.2 };
        chart.setOption({ geo: { center: c[name] || [104,35], zoom: z[name] || 2 } });
        document.getElementById('backBtn').classList.add('active');
    }

    function showProvinceDishes(name) {
        if (!dishData[name] || dishData[name].length === 0) return;
        currentProvince = name;
        document.getElementById('filmStrip').style.display = 'block';
        updateFilmStrip();
    }

    function resetMap() {
        currentProvince = null;
        document.getElementById('backBtn').classList.remove('active');
        document.getElementById('filmStrip').style.display = 'none';
        stopAutoScroll();
        chart.setOption({ geo: { center: [104,35], zoom: 1.1 } });
    }

    function updateFilmStrip() {
        var inner = document.getElementById('filmInner');
        if (!currentProvince || !dishData[currentProvince]) { inner.innerHTML = ''; return; }
        document.getElementById('filmProvince').textContent = currentProvince;
        document.getElementById('filmDesc').textContent = currentProvince + '省份美食';
        inner.innerHTML = dishData[currentProvince].map(function(d) {
            var img = d.imageUrl || 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22200%22%20height%3D%22150%22%20viewBox%3D%220%200%20200%20150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%231a1a2e%22%20rx%3D%228%22/%3E%3Ctext%20x%3D%22100%22%20y%3D%2280%22%20text-anchor%3D%22middle%22%20fill%3D%22rgba%28255%2C255%2C255%2C0.3%29%22%20font-size%3D%2214%22%20font-family%3D%22sans-serif%22%3E%E6%9A%82%E6%97%A0%E5%9B%BE%E7%89%87%3C/text%3E%3C/svg%3E';
            return '<div class="film-card" onclick="goDishHome(' + d.id + ')">' +
                '<div class="cover" style="background-image:url(\'' + img + '\')"></div>' +
                '<div class="meta"><div class="origin">' + (d.province || currentProvince) + '餐厅菜品</div>' +
                '<h4>' + d.name + '</h4>' +
                '<div class="summary">' + (d.description || '点击查看菜品详情') + '</div>' +
                '<div class="card-foot"><span class="tags">' + (d.tasteTags || d.sideDishes || '') + '</span><span class="price">¥' + d.price + '</span></div></div></div>';
        }).join('');
    }

    function goDishHome(dishId) {
        window.location.href = '/pages/dish-detail.html?id=' + encodeURIComponent(dishId);
    }

    function showDetail(dishId) {
        currentDishId = dishId;
        apiGet('/api/dish/' + dishId).then(function(res) {
            if (res.code !== 200) return;
            var d = res.data;
            document.getElementById('modalTitle').textContent = d.name;
            var tags = (d.tasteTags||'').split(',').filter(Boolean).map(function(t){return '<span class="tag tag-spicy">'+t+'</span>';}).join('');
            var sides = (d.sideDishes||'').split(',').filter(Boolean).map(function(s){return '<span class="tag tag-light">'+s+'</span>';}).join('');
            document.getElementById('modalBody').innerHTML =
                '<div style="text-align:center;margin-bottom:16px;"><img src="'+(d.imageUrl||'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22200%22%20height%3D%22150%22%20viewBox%3D%220%200%20200%20150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%231a1a2e%22%20rx%3D%228%22/%3E%3Ctext%20x%3D%22100%22%20y%3D%2280%22%20text-anchor%3D%22middle%22%20fill%3D%22rgba%28255%2C255%2C255%2C0.3%29%22%20font-size%3D%2214%22%20font-family%3D%22sans-serif%22%3E%E6%9A%82%E6%97%A0%E5%9B%BE%E7%89%87%3C/text%3E%3C/svg%3E')+'" alt="'+d.name+'" style="width:100%;max-height:260px;object-fit:cover;border-radius:12px;" onerror="this.src=\'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22200%22%20height%3D%22150%22%20viewBox%3D%220%200%20200%20150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%231a1a2e%22%20rx%3D%228%22/%3E%3Ctext%20x%3D%22100%22%20y%3D%2280%22%20text-anchor%3D%22middle%22%20fill%3D%22rgba%28255%2C255%2C255%2C0.3%29%22%20font-size%3D%2214%22%20font-family%3D%22sans-serif%22%3E%E6%9A%82%E6%97%A0%E5%9B%BE%E7%89%87%3C/text%3E%3C/svg%3E\'"></div>'+
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="font-size:28px;color:#f6d365;font-weight:bold;">¥'+d.price+'</span><span style="color:rgba(255,255,255,0.4);font-size:13px;">'+(d.province||'')+'</span></div>'+
                '<p style="margin-bottom:12px;color:rgba(255,255,255,0.6);line-height:1.6;">'+(d.description||'')+'</p>'+
                (tags ? '<div style="margin-bottom:8px;">'+tags+'</div>' : '')+
                (sides ? '<div style="margin-bottom:8px;"><span style="color:rgba(255,255,255,0.4);font-size:13px;">配菜: </span>'+sides+'</div>' : '');
            document.getElementById('detailModal').classList.add('active');
        });
    }

    function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
    function showToast(msg, type) {
        var old = document.querySelector('.custom-toast');
        if (old) old.remove();
        var el = document.createElement('div');
        el.className = 'custom-toast';
        if (type === 'success') { el.classList.add('toast-success'); msg = '✅ ' + msg; }
        else if (type === 'error') { el.classList.add('toast-error'); msg = '❌ ' + msg; }
        else { el.classList.add('toast-info'); msg = '✨ ' + msg; }
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(function() {
            el.style.opacity = '0';
            el.style.transform = 'translateX(60px)';
            setTimeout(function() { el.remove(); }, 300);
        }, 2000);
    }
    function addToCart() {
        if (!currentDishId) return;
        apiPost('/api/cart/add', {dishId:currentDishId,quantity:1}).then(function(res) {
            if (res.code === 200) { showToast('已加入购物车', 'success'); closeModal(); }
            else if (res.code === 401) { showToast('请先登录', 'error'); setTimeout(function(){ window.location.href='/pages/login.html'; }, 800); }
            else { showToast(res.message||'操作失败', 'error'); }
        });
    }

    var scrollState='AUTO_SCROLLING', scrollPos=0, velocity=0, lastX=0, lastTime=0, friction=0.95, autoSpeed=0.5;
    function startAutoScroll() {
        stopAutoScroll(); scrollState='AUTO_SCROLLING';
        autoScrollTimer=setInterval(function(){
            if(scrollState!=='AUTO_SCROLLING') return;
            var inner=document.getElementById('filmInner');
            if(!inner||inner.children.length===0) return;
            scrollPos+=autoSpeed;
            if(scrollPos>inner.scrollWidth/2) scrollPos=0;
            inner.scrollLeft=scrollPos;
        },16);
    }
    function stopAutoScroll(){if(autoScrollTimer){clearInterval(autoScrollTimer);autoScrollTimer=null;}}

    document.addEventListener('DOMContentLoaded',function(){
        var inner=document.getElementById('filmInner');
        if(!inner) return;
        inner.addEventListener('mousedown',function(e){stopAutoScroll();scrollState='DRAGGING';lastX=e.clientX;lastTime=Date.now();velocity=0;});
        document.addEventListener('mousemove',function(e){if(scrollState!=='DRAGGING')return;var dx=lastX-e.clientX;var dt=Date.now()-lastTime;if(dt>0)velocity=dx/dt;inner.scrollLeft+=dx;lastX=e.clientX;lastTime=Date.now();});
        document.addEventListener('mouseup',function(){if(scrollState==='DRAGGING'){scrollState='INERTIA_SLIDING';inertiaScroll();}});
        function inertiaScroll(){
            if(scrollState!=='INERTIA_SLIDING') return;
            if(Math.abs(velocity)<0.1){scrollState='AUTO_SCROLLING';startAutoScroll();return;}
            inner.scrollLeft+=velocity;velocity*=friction;requestAnimationFrame(inertiaScroll);
        }
    });

    checkLogin().then(function(user){
        var el=document.getElementById('userInfo');
        updateAdminLink(user);
        if(user){el.innerHTML='<span>'+(user.nickname||user.username)+'</span><a href="javascript:logout()" style="color:rgba(255,255,255,0.7);">退出</a>';}
        else{el.innerHTML='<a href="/pages/login.html" style="color:rgba(255,255,255,0.7);">登录</a>';}
    
    // 通知轮询
    var notifTimer = null;
    function checkNotifications() {
        apiGet('/api/notification/unread').then(function(res){
            var links = document.querySelectorAll('.header nav a');
            var ordersLink = null;
            links.forEach(function(a){ if(a.textContent.indexOf('订单')>=0) ordersLink=a; });
            if(!ordersLink) return;
            var existing = ordersLink.querySelector('.notif-dot');
            if(res.code===200 && res.data && res.data.length>0) {
                if(!existing) {
                    var dot = document.createElement('span');
                    dot.className = 'notif-dot';
                    dot.style.cssText = 'position:absolute;top:-4px;right:-12px;width:8px;height:8px;background:#e74c3c;border-radius:50%;';
                    ordersLink.style.position = 'relative';
                    ordersLink.appendChild(dot);
                }
            } else {
                if(existing) existing.remove();
            }
        });
    }
    checkNotifications();
    setInterval(checkNotifications, 30000);});
</script>
</body>
</html>
