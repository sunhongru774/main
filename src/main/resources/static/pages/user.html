<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 餐厅点餐与评价系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { min-height: 100vh; background: #0a0a1a; }
        .profile-page { padding-top: 80px; max-width: 640px; margin: 0 auto; padding-bottom: 40px; }
        .profile-card { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 36px; margin-bottom: 20px; }
        .profile-card h2 { margin-bottom: 24px; font-size: 20px; color: #f6d365; }
        .info-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .info-row .label { color: rgba(255,255,255,0.5); font-size: 14px; }
        .info-row .value { color: #fff; font-size: 14px; font-weight: 500; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 6px; }
        .actions { display: flex; gap: 12px; margin-top: 8px; }
        .toast-info { background: linear-gradient(135deg, #f6d365, #fda085); color: #1a1a2e; }
        .toast-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #ffffff; }
        .toast-error { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #ffffff; }
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="logo"> <span>餐厅点餐与评价系统</span></a>
    <nav>
        <a href="/pages/dishes.html">全部菜品</a><a href="/pages/ai-recommend.html">AI推荐</a><a href="/pages/cart.html">🛒 购物车</a><a href="/pages/orders.html">订单</a><a href="/pages/admin.html" id="adminLink" style="display:none;">管理后台</a>
        <span class="user-info" id="userInfo"></span>
    </nav>
</div>
<div class="profile-page" id="profilePage">
    <div class="profile-card" id="userInfoCard">
        <h2>账号信息</h2>
        <div class="info-row"><span class="label">用户名</span><span class="value" id="pUsername">加载中...</span></div>
        <div class="info-row"><span class="label">昵称</span><span class="value" id="pNickname">加载中...</span></div>
        <div class="info-row"><span class="label">手机号</span><span class="value" id="pPhone">加载中...</span></div>
        <div class="info-row"><span class="label">角色</span><span class="value" id="pRole">加载中...</span></div>
    </div>

    <div class="profile-card">
        <h2>编辑个人信息</h2>
        <form onsubmit="updateProfile(event)">
            <div class="form-group"><label>昵称</label><input class="form-input" id="editNickname" placeholder="请输入昵称"></div>
            <div class="form-group"><label>手机号</label><input class="form-input" id="editPhone" placeholder="请输入手机号"></div>
            <button class="btn btn-primary" type="submit">保存信息</button>
        </form>
    </div>

    <div class="profile-card">
        <h2>修改密码</h2>
        <form onsubmit="changePwd(event)">
            <div class="form-group"><label>原密码</label><input class="form-input" type="password" id="oldPwd" required placeholder="请输入原密码"></div>
            <div class="form-group"><label>新密码（至少6位）</label><input class="form-input" type="password" id="newPwd" required minlength="6" placeholder="请输入新密码"></div>
            <div class="form-group"><label>确认新密码</label><input class="form-input" type="password" id="confirmPwd" required minlength="6" placeholder="再次输入新密码"></div>
            <button class="btn btn-primary" type="submit">确认修改</button>
        </form>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    function showToast(msg, type) {
        var old = document.querySelector('.custom-toast');
        if (old) old.remove();
        var el = document.createElement('div');
        el.className = 'custom-toast';
        el.style.cssText = 'position:fixed;top:80px;right:24px;padding:14px 24px;border-radius:12px;font-size:14px;z-index:9999;animation:fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);min-width:220px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,0.45);backdrop-filter:blur(12px);font-weight:600;transition:all 0.3s ease;';
        if (type === 'success') { el.classList.add('toast-success'); el.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)'; msg = '✅ ' + msg; }
        else if (type === 'error') { el.classList.add('toast-error'); el.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)'; msg = '❌ ' + msg; }
        else { el.classList.add('toast-info'); el.style.background = 'linear-gradient(135deg, #f6d365, #fda085)'; msg = '✨ ' + msg; }
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(function() { el.style.opacity = '0'; el.style.transform = 'translateX(60px)'; setTimeout(function() { el.remove(); }, 300); }, 2000);
    }

    function updateProfile(e) {
        e.preventDefault();
        var nickname = document.getElementById('editNickname').value.trim();
        var phone = document.getElementById('editPhone').value.trim();
        if (!nickname && !phone) { showToast('请至少填写一个字段', 'error'); return; }
        apiPost('/api/user/update', {nickname: nickname, phone: phone}).then(function(res) {
            if (res.code === 200) { showToast('信息保存成功', 'success'); loadProfile(); }
            else { showToast(res.message || '保存失败', 'error'); }
        });
    }

    function loadProfile() {
        checkLogin().then(function(user) {
            if (!user) { window.location.href = '/pages/login.html'; return; }
            document.getElementById('pUsername').textContent = user.username;
            document.getElementById('pNickname').textContent = user.nickname || '未设置';
            document.getElementById('pPhone').textContent = user.phone || '未设置';
            document.getElementById('pRole').textContent = user.role === 1 ? '管理员' : '普通用户';
            document.getElementById('editNickname').value = user.nickname || '';
            document.getElementById('editPhone').value = user.phone || '';
            var el = document.getElementById('userInfo');
            updateAdminLink(user);
            if (user) el.innerHTML = '<span>' + (user.nickname || user.username) + '</span><a href="/pages/user.html" style="color:rgba(255,255,255,0.7);">个人中心</a> <a href="javascript:logout()" style="color:rgba(255,255,255,0.7);">退出</a>';
            else el.innerHTML = '<a href="/pages/login.html" style="color:rgba(255,255,255,0.7);">登录</a>';
        });
    }

    function changePwd(e) {
        e.preventDefault();
        var oldPwd = document.getElementById('oldPwd').value;
        var newPwd = document.getElementById('newPwd').value;
        var confirmPwd = document.getElementById('confirmPwd').value;
        if (newPwd !== confirmPwd) { showToast('两次输入的新密码不一致', 'error'); return; }
        if (newPwd.length < 6) { showToast('新密码至少需要6位', 'error'); return; }
        apiPost('/api/user/change-password', {oldPassword: oldPwd, newPassword: newPwd}).then(function(res) {
            if (res.code === 200) { showToast('密码修改成功', 'success'); document.getElementById('oldPwd').value = ''; document.getElementById('newPwd').value = ''; document.getElementById('confirmPwd').value = ''; }
            else { showToast(res.message || '修改失败', 'error'); }
        });
    }

    checkLogin().then(function(user) {
        if (!user) { window.location.href = '/pages/login.html'; return; }
        loadProfile();
    });
</script>
</body>
</html>
