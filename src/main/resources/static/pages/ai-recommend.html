<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能推荐 - 餐厅点餐与评价系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .recommend-form{padding:24px;margin-bottom:30px;}
        .recommend-form .form-row{display:flex;gap:16px;flex-wrap:wrap;}
        .recommend-form .form-group{flex:1;min-width:150px;}
        .recommend-form .btn{width:100%;padding:12px;font-size:16px;margin-top:16px;}
        .result-area{margin-top:24px;}
        .result-card{display:flex;align-items:center;gap:16px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.06);padding:16px;border-radius:12px;margin-bottom:16px;transition:all 0.3s;}
        .result-card:hover{border-color:rgba(246,211,101,0.15);}
        .result-card img{width:80px;height:80px;object-fit:cover;border-radius:10px;}
        .result-card .info{flex:1;}
        .result-card .info h4{margin-bottom:4px;}
        .result-card .info .reason{font-size:13px;color:rgba(255,255,255,0.5);margin-top:6px;padding:6px 12px;background:rgba(255,255,255,0.03);border-radius:8px;}
        .result-card .price{font-size:20px;font-weight:bold;color:#f6d365;}
        .loading{text-align:center;padding:40px;color:rgba(255,255,255,0.4);display:none;}
        .desc{color:rgba(255,255,255,0.4);margin-bottom:24px;}

        /* Chat styles */
        .chat-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 28px; }
        .chat-box { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; }
        .chat-msgs { height: 320px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .chat-msgs::-webkit-scrollbar { width: 3px; }
        .chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        .msg { max-width: 78%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: linear-gradient(135deg, #f6d365, #fda085); color: #1a1a2e; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); border-bottom-left-radius: 4px; }
        .msg.ai .thinking { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 6px; }
        .chat-input-area { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.15); }
        .chat-input-area input { flex: 1; border: none; outline: none; padding: 10px 14px; border-radius: 24px; font-size: 14px; background: rgba(255,255,255,0.06); color: #fff; }
        .chat-input-area input::placeholder { color: rgba(255,255,255,0.3); }
        .chat-input-area button { width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg, #f6d365, #fda085); color: #1a1a2e; font-size: 18px; cursor: pointer; transition: all 0.3s; flex-shrink: 0; }
        .chat-input-area button:hover { transform: scale(1.08); }
        .chat-input-area button:disabled { opacity: 0.4; }

    </style>
</head>
<body>
<div class="header">
    <a href="/" class="logo"><span>餐厅点餐与评价系统</span></a>
    <nav>
        <a href="/pages/dishes.html">全部菜品</a><a href="/pages/ai-recommend.html">AI推荐</a><a href="/pages/cart.html">购物车</a><a href="/pages/orders.html">订单</a><a href="/pages/admin.html" id="adminLink" style="display:none;">管理后台</a>
        <span class="user-info" id="userInfo"></span>
    </nav>
</div>
<div class="page-content">
    <h2> 智能点餐助手</h2>
    <p class="desc">告诉我你的口味偏好和预算，AI帮你推荐最合适的菜品组合</p>

    <div class="recommend-form card">
        <div class="form-row">
            <div class="form-group"><label>口味偏好</label><select class="form-select" id="taste"><option value="">不限</option><option value="辣">🌶️ 辣</option><option value="麻">麻</option><option value="酸甜">酸甜</option><option value="清淡">清淡</option><option value="鲜香">鲜香</option><option value="咸香">咸香</option><option value="浓郁">浓郁</option></select></div>
            <div class="form-group"><label>人均预算(元)</label><input class="form-input" type="number" id="budget" value="50" min="10" max="500"></div>
            <div class="form-group"><label>用餐人数</label><input class="form-input" type="number" id="people" value="2" min="1" max="20"></div>
            <div class="form-group"><label>省份偏好(可选)</label><select class="form-select" id="province"><option value="">不限</option><option value="四川">四川</option><option value="广东">广东</option><option value="山东">山东</option><option value="江苏">江苏</option><option value="浙江">浙江</option><option value="福建">福建</option><option value="湖南">湖南</option><option value="安徽">安徽</option><option value="北京">北京</option><option value="陕西">陕西</option></select></div>
        </div>
        <button class="btn btn-primary" id="recommendBtn" onclick="getRecommend()">获取AI推荐</button>
    </div>

    <div class="loading" id="loading"> AI正在思考推荐方案...</div>
    <div class="result-area" id="resultArea"></div>
</div>
<script src="/js/api.js"></script>
<script>
    function getRecommend(){
        var taste=document.getElementById('taste').value,budget=parseInt(document.getElementById('budget').value)||50,people=parseInt(document.getElementById('people').value)||2,province=document.getElementById('province').value;
        document.getElementById('loading').style.display='block';document.getElementById('resultArea').innerHTML='';document.getElementById('recommendBtn').disabled=true;
        apiPost('/api/ai/recommend',{taste:taste,budget:budget,peopleCount:people,province:province}).then(function(res){
            document.getElementById('loading').style.display='none';document.getElementById('recommendBtn').disabled=false;
            if(res.code!==200||!res.data||res.data.length===0){document.getElementById('resultArea').innerHTML='<div class="card card-body" style="text-align:center;color:rgba(255,255,255,0.4);"><p>暂无推荐结果，请调整条件重试</p></div>';return;}
            var total=0,html='<h3 style="margin-bottom:16px;">✨ AI推荐方案</h3>';
            res.data.forEach(function(d){total+=d.price;html+='<div class="result-card"><img src="'+(d.imageUrl||'/images/dishes/placeholder.jpg')+'" onerror="this.src=\'/images/dishes/placeholder.jpg\'"><div class="info"><h4>'+d.name+'</h4><span style="color:rgba(255,255,255,0.4);font-size:13px;">'+(d.tasteTags||'')+' · '+(d.province||'')+'</span><div class="reason">'+(d.reason||'推荐品尝')+'</div></div><div class="price">¥'+d.price+'</div></div>';});
            html+='<div class="card card-body" style="text-align:right;font-size:18px;">预估总价: <span style="color:#f6d365;font-weight:bold;">¥'+total.toFixed(2)+'</span></div>';
            document.getElementById('resultArea').innerHTML=html;
        });
    }
    checkLogin().then(function(user){var el=document.getElementById('userInfo');updateAdminLink(user);if(user){el.innerHTML='<span>'+(user.nickname||user.username)+'</span><a href="/pages/user.html" style="color:rgba(255,255,255,0.7);">个人中心</a> <a href="javascript:logout()" style="color:rgba(255,255,255,0.7);">退出</a>';}else{el.innerHTML='<a href="/pages/login.html" style="color:rgba(255,255,255,0.7);">登录</a>';}});
</script>



    <div class="chat-section card">
        <h3>与AI对话</h3>
        <div class="chat-box">
            <div class="chat-msgs" id="chatMsgs">
                <div class="msg ai">你好！我是餐厅点餐与评价系统的AI助手！可以问我营业时间、地址、电话、菜品等信息，请问有什么可以帮你的？<div class="thinking">可以问我关于本餐厅的问题，也可以问食材知识、美食文化等问题</div></div>
            </div>
            <div class="chat-input-area">
                <input id="chatInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter') sendChat()">
                <button id="chatSendBtn" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>


<script>
    var chatHistory = [];
    var chatEl = document.getElementById('chatMsgs');
    var chatInput = document.getElementById('chatInput');
    var chatBtn = document.getElementById('chatSendBtn');

    function addChatMsg(text, isUser) {
        var div = document.createElement('div');
        div.className = 'msg ' + (isUser ? 'user' : 'ai');
        div.textContent = text;
        if (!isUser) {
            var thinking = document.createElement('div');
            thinking.className = 'thinking';
            thinking.textContent = 'AI助手';
            div.appendChild(thinking);
        }
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function sendChat() {
        var msg = chatInput.value.trim();
        if (!msg) return;
        chatInput.value = '';
        addChatMsg(msg, true);
        chatBtn.disabled = true;
        chatInput.disabled = true;

        apiPost('/api/ai/chat', { message: msg, history: chatHistory }).then(function(res) {
            chatBtn.disabled = false;
            chatInput.disabled = false;
            chatInput.focus();
            var reply = res.data || '抱歉，暂时无法回答。';
            addChatMsg(reply, false);
            chatHistory.push(msg);
            chatHistory.push(reply);
        }).catch(function() {
            chatBtn.disabled = false;
            chatInput.disabled = false;
            addChatMsg('网络请求失败，请检查服务器连接。', false);
        });
    }
</script>
</body>
</html>
